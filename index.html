<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صائد العروض المجانية | Freebie Hunter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .deal-card { transition: transform 0.2s; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .deal-card:hover { transform: translateY(-5px); }
        .badge-free { background-color: #28a745; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Freebie Hunter Pro</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4 text-center">أحدث العروض المجانية بنسبة 100%</h2>
        <div class="row">
            {% for title, link, platform in deals %}
            <div class="col-md-4 mb-4">
                <div class="card deal-card h-100">
                    <div class="card-body">
                        <span class="badge badge-free mb-2">مجاني للأبد</span>
                        <h5 class="card-title">{{ title }}</h5>
                        <p class="text-muted">المنصة: {{ platform }}</p>
                        <a href="{{ link }}" target="_blank" class="btn btn-outline-primary w-100">اقتنص العرض الآن</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
